{% extends 'base.html' %}
{% block title %}Login — SkillSwap{% endblock %}
{% block content %}
<div class="max-w-md mx-auto card p-6 md:p-8">
  <h1 class="text-3xl font-black mb-6">Login</h1>
  <form method="post" class="space-y-5">
    {% csrf_token %}
    {% for field in form %}
      <div class="form-control">
        <label class="block font-bold mb-2">{{ field.label }}</label>{{ field }}
        {% for error in field.errors %}<p class="text-red-600 text-sm">{{ error }}</p>{% endfor %}
      </div>
    {% endfor %}
    <button class="w-full rounded-full bg-blue-600 px-6 py-3 font-bold text-white">Login</button>
  </form>
  <p class="mt-4 text-sm text-slate-600 dark:text-slate-300">No account? <a class="text-blue-600 font-bold" href="{% url 'register' %}">Register free</a></p>
</div>
{% endblock %}
